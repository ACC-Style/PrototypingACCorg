---
layout: default
name: "Simple Loading Page"
position: "Concept Page"
---
<style>
.load-wrap{min-height:100vh;display:grid;place-items:center;font-family:Arial,Helvetica,sans-serif}
.load-box{display:grid;justify-items:center;gap:1.5rem}
.load-box img{width:200px;height:auto}
.loader{display:flex;align-items:center;gap:.75rem}
.loader span{font-size:1.25rem;color:#004176;font-weight:600;letter-spacing:.05em}
.g{display:grid;grid-template-columns:repeat(3,14px);gap:3px}
.g i{display:block;height:14px;animation:p 1s ease infinite}
@keyframes p{0%,20%{transform:scale(1)}50%{transform:scale(.2)}80%,100%{transform:scale(1)}}
.g i:nth-child(1){background:#004176;animation-delay:-.4s}
.g i:nth-child(2),.g i:nth-child(4){background:#065a7a;animation-delay:-.3s}
.g i:nth-child(3),.g i:nth-child(5),.g i:nth-child(7){background:#0b727e;animation-delay:-.2s}
.g i:nth-child(6),.g i:nth-child(8){background:#118b81;animation-delay:-.1s}
.g i:nth-child(9){background:#16a385}
</style>
<div class="load-wrap">
  <div class="load-box">
    <img src="https://www.acc.org/-/media/Images/Logos/2022-Update/v2-ACC_SIG_BLUE_OUTLINE_BLUE.svg" alt="ACC Logo">
    <div class="loader">
      <div class="g"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      <span>Loading</span>
    </div>
  </div>
</div>

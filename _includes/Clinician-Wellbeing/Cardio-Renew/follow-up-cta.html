{% assign cwb = site.data.ClinicianWellBeing.pages %}
<div label="split-panel" class="bg_primary-5 br_radius columns_1 columns_2:md gap_4 gap_5:md grid m-t_4 m-x_n4 p_4 p_5:md relative">
  <div class="col-end_2:md col_all columns_1 grid isolation_isolate overflow_hidden relative rows_1 min-h_15">
    <picture class="col_all row_all bg_cover flex flex_column inset_0 absolute">
      <img src="https://www.acc.org/-/media/Non-Clinical/Images/Features/WellBeingHub/CardioRenew/S25097-Cardio-Renew-Branding-1024x256.png" alt="" class="bg_cover flex_100">
    </picture>
    <div class="b_3 col_all font-size_up-2 grid inset_0 justify_start m-y_4 relative row_all self_center">
      <h2 class="font-size_up-2 lh_1 m_0 c_white isolation_isolate relative">
        <span class="inline-block p-x_4 p-y_3 bg_acc-n3" style="box-decoration-break: clone;">Cardio Renew</span>
      </h2>
    </div>
  </div>
  <div class="font_n1 font_0:lg flex_column flex gap_4">
    <div zone-label="main-content" class="p-y_4">
      <h2 class="m-b_3 lh_1 font_medium font_display"><strong class="font-size_up m-b_2 block">Ready to reconnect with your purpose?</strong></h2>
      <p class="font-size_up lh_3">Join mid-career ACC members in a cohort focused on resilience, reflection, and reconnection.</p>
      <a href="#Application" class="btn btn-primary expanded-click-area shadow_overlap-bold m-t_3">View application details</a>
      <p class="m-t_3 m-b_0"><a href="{{ cwb.hub | relative_url }}" class="font-size_down">&larr; Back to Clinician Well-Being hub</a></p>
    </div>
  </div>
</div>

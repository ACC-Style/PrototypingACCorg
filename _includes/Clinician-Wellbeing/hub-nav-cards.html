{% assign cards = site.data.ClinicianWellBeing.hub_nav_cards.cards %}
<div class="relative bg_white z_3">
  <div class="z_4 isolation_isolate p_3 p_4:md p-t_5:lg m-y_3 m-y_4:md m-t_5:lg bg_black-1 wrapper-container reading-typography shadow_emboss-light">
    <ul class="columns_2:lg columns_2:md columns_1 gap-x_5:xl gap-x_4:lg gap-x_3 gap-y_4 grid p-x_4:xl p-x_3:lg p-x_0 ul_none">
      {% for card in cards %}
      <li class="flex flex_row:md flex_column items_start:md items_center justify_start isolate relative c_accent-n1 p_3 p_4:md br_radius h:bg_accent-5">
        <i class="c_inherit-all font_7 self_center self_start:md p-x_4 p-b_4 p-t_2 p-t_4:md m-t_0 m-t_3:md p-r_4:md {{ card.icon }}" aria-hidden="true"></i>
        <a class="expanded-click-area not-link h:undecorated font-size_up block" href="{{ card.href }}">
          <strong class="font_bold not-link c_inherit-all lh_2 text_center text_left:md m-b_3 m-b_0:md" style="text-wrap-style: balance;">
            {{ card.title }} <i class="fa-solid fa-arrow-alt-circle-right p-x_2" aria-hidden="true"></i>
          </strong>
          <span class="block font-size_down opacity_8 c_black">{{ card.description }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>
  </div>
</div>

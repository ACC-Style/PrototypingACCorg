title: ACC's Commitment
intro: >-
  As the professional home for cardiovascular clinicians, ACC is deeply committed
  to the health, resilience, and well-being of the global CV workforce.
body: >-
  Clinician well-being is embedded in ACC&rsquo;s 2019&ndash;2028 Strategic Plans.
  The College tracks burnout among members and members&rsquo; perceptions of ACC as
  a resource — and develops evidence-based interventions at individual, team, and
  institutional levels.
footnote: Clinician Well-Being work group · Member-driven initiatives

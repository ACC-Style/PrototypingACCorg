  cta_title: Self Care is also part of the job.
  cta_description: Burnout is not a personal failing. Start with practical resources you can use now — or explore where ACC is leading the profession.
  cta_button: Explore Resources
  cta_link: "#hub-support-title"

intro:
  heading: Why ACC Cares for You
  body_1: Cardiovascular professionals carry high-stakes responsibility every day. When clinicians are depleted, patients and teams feel the impact. The ACC is committed to reversing that cycle.
  body_2: Individual resilience matters — but burnout is also driven by administrative burden, workforce shortages, and culture. That is why ACC pairs personal tools with workplace guidance and national advocacy.
  cardio_renew:
    title: Cardio Renew
    body: A seven-month virtual cohort for mid-career ACC members focused on resilience, reflection, and reconnection through coaching in self-leadership and emotional intelligence.
    button: Learn More

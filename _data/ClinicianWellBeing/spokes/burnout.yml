title: Burnout & Resilience
intro: >-
  Burnout is widespread among cardiovascular professionals. These resources help you
  recognize warning signs, understand causes beyond individual resilience, and access
  credible ACC and partner support.
goals:
  - Recognize burnout in yourself and your team
  - Find practical tools and education without stigma
  - Connect to ACC advocacy on workforce well-being
sections:
  - id: tools
    title: Tools & Guides
    resources:
      - title: ACC Clinician Well-Being Toolkit
        note: Slide deck for conversations and team discussions.
        url: https://www.acc.org/~/media/Non-Clinical/Files-PDFs-Excel-MS-Word-etc/2020/05/26/Clinician-Well-Being-Toolkit.pptx
        format: pdf
      - title: ACC Clinician Well-Being Infographic
        note: Visual overview of prevalence and impact.
        url: https://www.acc.org/education-and-meetings/image-and-slide-gallery/media-detail?id=9837bbc35b74465b9e97f7d620e85080
      - title: National Academy of Medicine — Clinician Well-Being Collaborative
        note: National resources and resilience frameworks.
        url: https://nam.edu/initiatives/clinician-resilience-and-well-being/
        format: external

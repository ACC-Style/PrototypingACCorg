title: CardioSafe
status: Coming late 2026
intro: >-
  CardioSafe helps cardiovascular clinicians recognize, respond to, and address
  patient-initiated mistreatment. Supported by a Physicians Foundation grant, the
  initiative includes educational modules and guidance for individuals and institutions.
goals:
  - Recognize patient- and visitor-initiated mistreatment
  - Respond with evidence-based strategies
  - Report and track incidents using best practices
sections:
  - id: modules
    title: Educational Modules
    resources:

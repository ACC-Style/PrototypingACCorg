title: Cardio Renew
subtitle: Reignite your purpose. Reconnect with peers. Re-energize your career.
intro: >-
  The ACC's Cardio Renew program supports mid-career ACC members through a virtual
  curriculum focused on resilience, reflection, and reconnection. Cardio Renew promotes
  well-being through coaching on self-leadership, emotional intelligence, and personal growth.
quote:
  text: Cardio Renew will help CV professionals reconnect with their purpose and strengthen their non-clinical competencies that make practice more rewarding.
  author: Retu Saxena, MD, FACC, Cardio Renew Faculty
not_cme: This program is not CME certified.
highlights:
  - value: "7"
    label: Month cohort experience
  - value: "6"
    label: Virtual modules (90 min each)
  - value: "1"
    label: In-person meet & greet at ACC.26
application:
  status: Applications open
  deadline: Jan. 30, 2026
  deadline_note: Only completed applications received by the deadline will be considered.
  faq_url: https://www.acc.org/-/media/Non-Clinical/Images/Features/WellBeingHub/CardioRenew/Cardio-Renew-FAQ-Sheet.pdf
  contact_email: memberengage@acc.org
course_details:
  - label: Course Length
    value: Seven months
  - label: Format
    value: Six virtual modules (90 minutes each) — session dates in the application
  - label: In-Person Requirement
    value: Meet & greet at ACC.26 (mandatory)
  - label: Optional
    value: One-on-one coaching sessions
  - label: Certification
    value: Not CME certified
eligibility:
  - ACC members in good standing
  - Mid-career cardiovascular professionals (including CV Team members and program directors)
  - No prior ACC leadership cohort experience
  - No current or prior ACC leadership roles
benefits:
  - title: Tools for emotional regulation and self-leadership
    icon: far fa-heart
  - title: Enhanced communication and decision-making skills
    icon: far fa-comments
  - title: Safe space to explore values and reconnect with your Why
    icon: far fa-seedling
why: >-
  Burnout is a growing concern among cardiovascular professionals, especially women and
  mid-career clinicians. Cardio Renew provides a supportive space to explore personal values,
  understand emotional resilience, and reconnect with purpose.

burnout_dimensions:
  heading: What Is Burnout?
  intro: Adapted from the World Health Organization — burnout has three dimensions.
  items:
  - icon: fa-battery-quarter
    title: Exhaustion
    description: Feeling overextended and depleted of the emotional and physical resources you need to recover.
  - icon: fa-user-slash
    title: Cynicism
    description: A negative or detached response to the job — loss of idealism and dehumanization of others.
  - icon: fa-chart-line-down
    title: Inefficacy
    description: Feeling incompetent and unproductive — a lack of achievement at work.

workplace_domains:
  heading: Three Domains of Workplace Well-Being
  intro: Sustainable well-being requires changes in how practices run, how cultures support people, and how institutions invest in teams.
  items:
  - icon: fa-gauge-high
    title: Workplace Efficiency
    description: Reduce administrative burden, protect documentation time, and involve clinicians in workflow design.
  - icon: fa-hand-holding-heart
    title: Culture of Wellness
    description: Wellness committees, champions, mental health support, and family-supportive policies.
  - icon: fa-seedling
    title: Personal Resilience (Organizational)
    description: Coaching, peer dialogue, financial wellness resources, and Employee Assistance Programs.

trust_pillars:
  heading: Four Trust Pillars for Team Communication
  items:
  - icon: fa-heart
    title: Caring and Empathy
    description: Acknowledge worry and let others voice concern before delivering information.
  - icon: fa-handshake
    title: Dedication and Commitment
    description: Address and confirm team needs — show you are invested in their well-being.
  - icon: fa-user-md
    title: Competence and Expertise
    description: Share knowledge and cite trusted sources so messages carry credibility.
  - icon: fa-comments
    title: Honesty and Openness
    description: Be transparent about facts and feelings to maintain trust over time.


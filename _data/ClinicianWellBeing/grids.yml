tools_branches:
  heading: Choose Your Path
  items:
  - icon: fa-brain
    title: Mental Health & Burnout
    description: Recognize burnout, build self-care habits, and find confidential support.
    url_key: mental_health
  - icon: fa-hospital
    title: Strengthen Your Workplace
    description: Change practice efficiency, culture, and team support — not just individual coping.

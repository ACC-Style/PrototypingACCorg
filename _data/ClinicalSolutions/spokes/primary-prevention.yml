title: Primary Prevention of CV Disease
compact: false
intro: Cardiovascular prevention works best when risk is found early and managed over a lifetime. This solution set helps clinicians assess risk, start the right therapies, and coordinate team-based prevention.
goals:
  - Guide early risk assessment and interventions with lifetime benefit in mind
  - Support team-based prevention that lowers cumulative risk
  - Promote equitable cardiovascular health across the lifespan
